version: 0.1
component: build
timeoutInSeconds: 600
runAs: root
shell: bash

env:
  exportedVariables:
    - BUILDRUN_HASH

steps:
  - type: Command
    name: "Set build hash"
    timeoutInSeconds: 40
    command: |
      export BUILDRUN_HASH=$(echo ${OCI_BUILD_RUN_ID} | rev | cut -c 1-7)
      echo "BUILDRUN_HASH=$BUILDRUN_HASH"
      mkdir -p output
      cp hello.py output/hello.py

outputArtifacts:
  - name: hello_py_artifact
    type: BINARY
    location: output/hello.py
